<section class="section" id="booking">
  <div class="booking">
    <h2>Book a Consultation Online</h2>
    <p>Complete the form below to request a consultation or training session with Clarionmark Group.</p>

    <form>
      <label>Full Name</label>
      <input type="text" placeholder="Enter your full name">

      <label>Phone Number</label>
      <input type="text" placeholder="+263...">

      <label>Email Address</label>
      <input type="email" placeholder="example@email.com">

      <label>Select Service</label>
      <select>
        <option>Data Analytics Consultation</option>
        <option>Corporate Training Booking</option>
        <option>Power BI Dashboard Consultation</option>
        <option>Python, SQL, R, Excel & VBA Training</option>
        <option>PostgreSQL Database Consultation</option>
        <option>AI & Automation Consultation</option>
      </select>

      <label>Preferred Date</label>
      <input type="date">

      <label>Additional Information</label>
      <textarea rows="5" placeholder="Describe your requirements"></textarea>

      <button type="submit">Submit Booking Request</button>
    </form>
  </div>
</section>
